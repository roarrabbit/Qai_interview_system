{% extends "base.html" %}

{% block title %}登录 - 智能招聘平台{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="bi bi-briefcase-fill"></i>
            </div>
            <h1 class="auth-title">欢迎回来</h1>
            <p class="auth-subtitle">登录您的账户，开启智能求职之旅</p>
        </div>
        
        <form class="auth-form" id="login-form" onsubmit="return false;">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
            </div>
            
            <button type="button" class="btn btn-primary btn-block btn-lg" onclick="handleLogin()">
                登录
            </button>
        </form>
        
        <div class="auth-footer">
            <p>还没有账号？<a href="/register">立即注册</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function handleLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    if (!username || !password) {
        toast.error('请输入用户名和密码');
        return;
    }
    
    try {
        const formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('password', password);
        
        const response = await axios.post('/api/auth/login', formData, {
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        });
        
        if (response.data.access_token) {
            toast.success('登录成功！');
            setTimeout(() => {
                const userRole = response.data.user?.role;
                if (userRole === 'admin') {
                    window.location.href = '/admin-dashboard';
                } else if (userRole === 'hr') {
                    window.location.href = '/hr-dashboard';
                } else {
                    window.location.href = '/profile';
                }
            }, 500);
        }
    } catch (error) {
        console.error('登录错误：', error);
        let errorMsg = '登录失败，请检查用户名和密码';
        
        if (error.response?.data?.detail) {
            errorMsg = error.response.data.detail;
        } else if (error.response?.status === 429) {
            errorMsg = '登录尝试次数过多，请稍后再试';
        }
        
        toast.error(errorMsg);
    }
}

document.getElementById('login-form')?.addEventListener('submit', (e) => {
    e.preventDefault();
    handleLogin();
});

document.getElementById('password')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        handleLogin();
    }
});
</script>
{% endblock %}
