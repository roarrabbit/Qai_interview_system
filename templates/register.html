{% extends "base.html" %}

{% block title %}注册 - 智能招聘平台{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="bi bi-briefcase-fill"></i>
            </div>
            <h1 class="auth-title">创建账户</h1>
            <p class="auth-subtitle">加入平台，开启智能求职之旅</p>
        </div>
        
        <form class="auth-form" id="register-form" onsubmit="return false;">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required>
                <p class="form-text">仅支持字母、数字、下划线，填写后不可修改</p>
            </div>
            
        <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
                <p class="form-text">至少8位，必须包含字母和数字</p>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <p class="strength-text" id="strengthText"></p>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="confirm_password">确认密码</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="请再次输入密码" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="role">身份选择</label>
                <select class="form-select" id="role" name="role" required>
                    <option value="">请选择身份</option>
                    <option value="candidate">求职者</option>
                    <option value="hr">招聘者（HR）</option>
                </select>
            </div>
            
            <button type="button" class="btn btn-primary btn-block btn-lg" onclick="handleRegister()">
                注册
            </button>
        </form>
        
        <div class="auth-footer">
            <p>已有账号？<a href="/login">立即登录</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('password').addEventListener('input', function() {
    const password = this.value;
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');
    
    if (password.length === 0) {
        strengthFill.className = 'strength-fill';
        strengthFill.style.width = '0';
        strengthText.textContent = '';
        return;
    }
    
    const hasLetter = /[A-Za-z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    const minLength = password.length >= 8;
    
    // 清除内联样式，让CSS类的宽度生效
    strengthFill.style.width = '';
    
    if (minLength && hasLetter && hasNumber) {
        strengthFill.className = 'strength-fill strong';
        strengthText.textContent = '密码强度合格';
        strengthText.style.color = '#10b981';
    } else if (hasLetter && hasNumber) {
        strengthFill.className = 'strength-fill medium';
        strengthText.textContent = '密码长度不足';
        strengthText.style.color = '#f59e0b';
    } else {
        strengthFill.className = 'strength-fill weak';
        strengthText.textContent = '密码强度不足';
        strengthText.style.color = '#ef4444';
    }
});

async function handleRegister() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    const role = document.getElementById('role').value;
    
    if (!username || !password || !role) {
        toast.error('请填写所有必填项');
        return;
    }
    
    if (username.length < 3 || username.length > 50) {
        toast.error('用户名格式不正确');
        return;
    }
    
    if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        toast.error('用户名格式不正确');
        return;
    }
    
    if (password !== confirmPassword) {
        toast.error('两次输入的密码不一致');
        return;
    }
    
    if (password.length < 8 || password.length > 128) {
        toast.error('密码强度不足');
        return;
    }
    
    if (!/[A-Za-z]/.test(password)) {
        toast.error('密码强度不足');
        return;
    }
    
    if (!/[0-9]/.test(password)) {
        toast.error('密码强度不足');
        return;
    }
    
    try {
        const response = await axios.post('/api/auth/register', {
            username: username,
            password: password,
            role: role
        });
        
        toast.success('注册成功！正在跳转到登录页面...');
        
        setTimeout(() => {
            window.location.href = '/login';
        }, 2000);
        
    } catch (error) {
        console.error('注册错误：', error);
        let errorMsg = '注册失败，请重试';
        
        if (error.response?.data?.detail) {
            if (typeof error.response.data.detail === 'string') {
                errorMsg = error.response.data.detail;
            } else if (Array.isArray(error.response.data.detail)) {
                errorMsg = error.response.data.detail.map(e => e.msg).join('; ');
            }
        }
        
        toast.error(errorMsg);
    }
}

document.getElementById('register-form')?.addEventListener('submit', (e) => {
    e.preventDefault();
    handleRegister();
});
</script>
{% endblock %}
